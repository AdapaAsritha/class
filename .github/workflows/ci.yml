name: Issues Workflow

on:
  issues:
    types:
      - opened
      - edited
      - closed

  workflow_dispatch:

jobs:
  issue-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print Event
        run: echo "An Issue event triggered this workflow!"

      - name: Show Event Type
        run: echo "Event = ${{ github.event.action }}"

      - name: Show Issue Title
        run: echo "Issue Title = ${{ github.event.issue.title }}"